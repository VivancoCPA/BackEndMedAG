services:
  postgres:
    image: postgres:16
    container_name: sample-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: Historias2026!
      POSTGRES_DB: SampleMedical
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

